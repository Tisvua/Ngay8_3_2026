<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 Lá thư gửi em</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* === HOLD NEXT BUTTON === */
        .hold-next-btn {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: rgba(255,105,180,0.85);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255,105,180,0.4);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            z-index: 9999;
        }
        .hold-next-btn.show {
            display: flex;
        }
        .hold-next-btn svg {
            position: absolute;
            top: -4px;
            left: -4px;
            width: 64px;
            height: 64px;
            transform: rotate(-90deg);
        }
        .hold-next-btn svg circle {
            fill: none;
            stroke: #fff;
            stroke-width: 3;
            stroke-dasharray: 176;
            stroke-dashoffset: 176;
            stroke-linecap: round;
        }
        .hold-next-btn.holding svg circle {
            animation: holdFill 3s linear forwards;
        }
        @keyframes holdFill {
            0% { stroke-dashoffset: 176; }
            100% { stroke-dashoffset: 0; }
        }

        /* === CUTE GIF before envelope opens === */
        .pre-envelope-gif {
            position: fixed;
            bottom: 10px;
            left: 10px;
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .pre-envelope-gif img {
            width: 240px;
            height: 240px;
            object-fit: contain;
        }
        .pre-envelope-gif.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* === BACKGROUND IMAGE (mobile-safe) === */
        .bg-fixed {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url('assets/images/5.jpg') center center / cover no-repeat;
            pointer-events: none;
        }

        .bg-fixed::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 240, 245, 0.4);
        }

        .page-wrapper, .hearts-bg, .confetti-container {
            position: relative;
            z-index: 1;
        }

        /* === LETTER PAGE SPECIFIC === */
        .letter-page {
            padding: 20px;
            padding-top: 70px;
            padding-bottom: 40px;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Envelope */
        .envelope-container {
            perspective: 1000px;
            margin: 30px 0;
            cursor: pointer;
            position: relative;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .envelope-container.fade-out {
            opacity: 0;
            transform: scale(0.5) translateY(-40px);
            pointer-events: none;
        }

        .envelope-container.hidden {
            display: none;
        }

        .envelope {
            width: 280px;
            height: 200px;
            position: relative;
            transition: all 0.8s ease;
        }

        .envelope-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFE4E1, #FFF0F5);
            border-radius: 10px;
            border: 2px solid var(--pink-main);
            position: relative;
            box-shadow: 0 5px 25px rgba(255, 105, 180, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .envelope-body::before {
            content: '💌';
            font-size: 60px;
            position: absolute;
            transition: all 0.5s ease;
        }

        .envelope-label {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: var(--pink-accent);
            font-weight: 600;
            white-space: nowrap;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, var(--pink-soft), var(--pink-pastel));
            border-radius: 10px 10px 0 0;
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            z-index: 3;
            transition: transform 0.6s ease;
            transform-origin: top center;
            border: 2px solid var(--pink-main);
        }

        .envelope.opened .envelope-flap {
            transform: rotateX(180deg);
        }

        .envelope.opened .envelope-body::before {
            opacity: 0;
            transform: translateY(-30px) scale(1.3);
            transition: all 0.6s ease;
        }

        .envelope.opened .envelope-stamp {
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease 0.2s;
        }

        /* Heart stamp */
        .envelope-stamp {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 28px;
            z-index: 4;
            animation: floatIcon 3s ease-in-out infinite;
        }

        .envelope-container.hidden {
            display: none;
        }

        /* Click hint */
        .click-hint {
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
            margin-top: 50px;
            animation: fadeInUp 0.6s ease forwards;
            transition: opacity 0.5s ease;
        }

        .click-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Letter Paper */
        .letter-container {
            display: none;
            width: 100%;
            max-width: 520px;
            animation: letterSlideUp 0.8s ease forwards;
        }

        .letter-container.show {
            display: block;
        }

        @keyframes letterSlideUp {
            from {
                opacity: 0;
                transform: translateY(80px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .letter-paper {
            background: rgba(255, 250, 245, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px 35px;
            box-shadow: 0 10px 50px rgba(255, 105, 180, 0.2);
            border: 1px solid rgba(255, 182, 193, 0.5);
            position: relative;
            overflow: hidden;
            min-height: 400px;
        }

        /* Paper texture lines */
        .letter-paper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 31px,
                    rgba(255, 182, 193, 0.2) 31px,
                    rgba(255, 182, 193, 0.2) 32px
                );
            background-position: 0 38px;
            pointer-events: none;
        }

        /* Red margin line */
        .letter-paper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 45px;
            width: 2px;
            height: 100%;
            background: rgba(255, 105, 180, 0.15);
            pointer-events: none;
        }

        .letter-greeting {
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            color: var(--pink-accent);
            margin-bottom: 20px;
            font-weight: 700;
            text-shadow: 0 1px 4px rgba(255,255,255,0.8);
        }

        .letter-body {
            font-family: 'Dancing Script', cursive;
            font-size: 20px;
            line-height: 2;
            color: var(--text-dark);
            min-height: 200px;
            position: relative;
            z-index: 1;
            text-shadow: 0 1px 3px rgba(255,255,255,0.7);
        }

        .letter-body .cursor {
            display: inline-block;
            width: 2px;
            height: 22px;
            background: var(--pink-accent);
            margin-left: 2px;
            animation: blink 0.8s step-start infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .letter-signature {
            font-family: 'Dancing Script', cursive;
            font-size: 24px;
            color: var(--pink-accent);
            text-align: right;
            margin-top: 30px;
            opacity: 0;
            transition: opacity 0.5s ease;
            font-weight: 700;
            text-shadow: 0 1px 4px rgba(255,255,255,0.8);
        }

        .letter-signature.show {
            opacity: 1;
        }

        .letter-heart {
            text-align: center;
            font-size: 40px;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .letter-heart.show {
            opacity: 1;
            animation: heartbeat 1s ease-in-out infinite;
        }

        /* === Choice Modal === */
        .choice-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 245, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .choice-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .choice-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 28px;
            padding: 40px 35px;
            text-align: center;
            box-shadow: 0 15px 60px rgba(255, 105, 180, 0.25);
            border: 2px solid rgba(255, 182, 193, 0.4);
            max-width: 360px;
            width: 90vw;
            transform: scale(0.8) translateY(30px);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .choice-modal.show .choice-card {
            transform: scale(1) translateY(0);
        }

        .choice-emoji {
            font-size: 50px;
            margin-bottom: 12px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .choice-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--pink-accent);
            margin-bottom: 28px;
        }

        .choice-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .choice-buttons .btn-pink {
            padding: 14px 24px;
            font-size: 15px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s ease;
            border: 2px solid var(--pink-accent);
        }

        .btn-replay {
            background: transparent;
            color: var(--pink-accent);
        }

        .btn-replay:hover {
            background: rgba(255, 105, 180, 0.08);
            transform: scale(1.03);
        }

        .btn-continue {
            background: linear-gradient(135deg, var(--pink-accent), var(--pink-deep));
            color: white;
            border-color: transparent !important;
            box-shadow: 0 4px 20px rgba(255, 105, 180, 0.35);
        }

        .btn-continue:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 25px rgba(255, 105, 180, 0.45);
        }

        @media (max-width: 480px) {
            .choice-card {
                padding: 30px 24px;
            }

            .choice-emoji {
                font-size: 40px;
            }

            .choice-text {
                font-size: 16px;
                margin-bottom: 22px;
            }

            .choice-buttons .btn-pink {
                padding: 12px 20px;
                font-size: 14px;
            }
        }

        /* Confetti */
        .confetti-container .confetti-piece {
            position: absolute;
            top: -20px;
            animation: confettiFall linear forwards;
        }

        @media (max-width: 480px) {
            .envelope {
                width: 230px;
                height: 165px;
            }

            .letter-paper {
                padding: 30px 25px;
                min-height: unset;
            }

            .letter-greeting {
                font-size: 24px;
            }

            .letter-body {
                font-size: 17px;
                line-height: 1.8;
                min-height: unset;
            }

            .letter-signature {
                font-size: 20px;
                margin-top: 16px;
            }

            .letter-heart {
                margin-top: 10px;
                font-size: 30px;
            }
        }

        /* === MOBILE LAYOUT === */
        @media (max-width: 820px) {
            html, body {
                overflow-x: hidden;
            }

            /* Block scroll only while envelope is showing */
            body.envelope-phase {
                overflow: hidden;
                touch-action: none;
                height: 100%;
            }

            body.envelope-phase .letter-page {
                min-height: 100vh;
                justify-content: center;
                padding-top: 0;
                padding-bottom: 0;
            }

            .letter-page {
                padding-top: 30px;
                padding-bottom: 30px;
            }

            .envelope-container {
                margin: 16px 0;
            }

            .letter-container.show {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-heart">💕</div>
        <div class="loading-text">Đang tải yêu thương...</div>
    </div>

    <!-- Background Image -->
    <div class="bg-fixed"></div>

    <!-- Floating Hearts Background -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- Confetti Container -->
    <div class="confetti-container" id="confettiContainer"></div>

    <!-- YouTube Music (ẩn) -->
    <div id="ytPlayer" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;"></div>
    <script>
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
    var ytPlayer;
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('ytPlayer', {
            videoId: 'HK_ozvD4GcQ',
            playerVars: { autoplay: 1, loop: 1, playlist: 'HK_ozvD4GcQ', controls: 0, showinfo: 0, rel: 0, modestbranding: 1 },
            events: { onReady: function(e) { e.target.playVideo(); } }
        });
    }
    document.addEventListener('visibilitychange', function() {
        if (!document.hidden && ytPlayer && ytPlayer.playVideo) {
            try { ytPlayer.playVideo(); } catch(e) {}
        }
    });
    </script>

    <!-- Main Content -->
    <div class="page-wrapper">
        <div class="letter-page">
            <h1 class="page-title">💌 Lá thư gửi Chann</h1>
            <p class="page-subtitle">Có những điều Tui muốn nói với Chann...</p>

            <!-- Envelope -->
            <div class="envelope-container" id="envelopeContainer" onclick="openEnvelope()">
                <div class="envelope" id="envelope">
                    <div class="envelope-flap"></div>
                    <div class="envelope-body"></div>
                    <div class="envelope-stamp">💖</div>
                </div>
                <div class="envelope-label">Nhấn để mở thư 💕</div>
            </div>

            <p class="click-hint" id="clickHint"></p>

    <!-- Cute gif before envelope opens -->
    <div class="pre-envelope-gif" id="preEnvelopeGif">
        <img src="assets/gif/Cute/9.webp" alt="">
    </div>

            <!-- Letter -->
            <div class="letter-container" id="letterContainer">
                <div class="letter-paper">
                    <div class="letter-greeting" id="letterGreeting"></div>
                    <div class="letter-body" id="letterBody"><span class="cursor" id="typingCursor"></span></div>
                    <div class="letter-signature" id="letterSignature">
                        Yêu em nhiều,<br>
                        💕 Người luôn yêu em
                    </div>
                </div>

            </div>

        </div>
    </div>

    <!-- Hold NEXT button (fixed bottom center) -->
    <button class="hold-next-btn" id="nextBtn">
        <svg><circle cx="32" cy="32" r="28"></circle></svg>
        NEXT
    </button>

    <script src="js/transition.js"></script>
    <script src="js/letter.js"></script>
    <script>
    (function () {
        var btn = document.getElementById('nextBtn');
        if (!btn) return;
        var timer = null;
        function startHold() {
            btn.classList.add('holding');
            timer = setTimeout(function () {
                if (typeof navigateWithCar === 'function') {
                    navigateWithCar('gallery.html', 'forward');
                } else {
                    window.location.href = 'gallery.html';
                }
            }, 3000);
        }
        function cancelHold() {
            btn.classList.remove('holding');
            if (timer) { clearTimeout(timer); timer = null; }
            var circle = btn.querySelector('circle');
            circle.style.animation = 'none';
            void circle.offsetWidth;
            circle.style.animation = '';
        }
        btn.addEventListener('mousedown', startHold);
        btn.addEventListener('touchstart', function (e) { e.preventDefault(); startHold(); });
        btn.addEventListener('mouseup', cancelHold);
        btn.addEventListener('mouseleave', cancelHold);
        btn.addEventListener('touchend', cancelHold);
        btn.addEventListener('touchcancel', cancelHold);
    })();
    </script>
</body>
</html>
