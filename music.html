<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 Nhạc dành cho em</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* === MUSIC PAGE SPECIFIC === */
        .music-page {
            padding: 20px;
            padding-top: 70px;
            padding-bottom: 40px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Vinyl Disc */
        .vinyl-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .vinyl-disc {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, 
                var(--pink-deep) 0%, 
                var(--pink-accent) 15%, 
                var(--pink-soft) 16%,
                var(--pink-main) 30%,
                var(--pink-pastel) 31%,
                var(--pink-soft) 45%,
                var(--pink-main) 46%,
                var(--pink-accent) 60%,
                var(--pink-deep) 80%,
                var(--pink-dark) 100%
            );
            box-shadow: 0 8px 40px rgba(255, 105, 180, 0.4);
            position: relative;
            transition: transform 0.3s ease;
        }

        .vinyl-disc::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--white);
            box-shadow: inset 0 0 10px rgba(255, 105, 180, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vinyl-disc::after {
            content: '💖';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
        }

        .vinyl-disc.spinning {
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Now Playing Info */
        .now-playing {
            text-align: center;
            margin: 20px 0;
        }

        .song-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--pink-accent);
            margin-bottom: 5px;
        }

        .song-artist {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
        }

        .song-message {
            font-size: 13px;
            color: var(--pink-dark);
            font-style: italic;
            margin-top: 10px;
            padding: 10px 15px;
            background: rgba(255, 182, 193, 0.15);
            border-radius: 15px;
            border-left: 3px solid var(--pink-accent);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Progress Bar */
        .progress-container {
            margin: 25px 0 15px;
        }

        .progress-bar-wrapper {
            width: 100%;
            height: 6px;
            background: var(--pink-pastel);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--pink-accent), var(--pink-deep));
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background: var(--pink-accent);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255, 105, 180, 0.5);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 8px;
            font-weight: 600;
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .control-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: var(--transition);
            padding: 8px;
            border-radius: 50%;
        }

        .control-btn:hover {
            transform: scale(1.15);
            background: rgba(255, 182, 193, 0.2);
        }

        .control-btn.play-btn {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--pink-accent), var(--pink-deep));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 20px rgba(255, 105, 180, 0.4);
            color: white;
        }

        .control-btn.play-btn:hover {
            box-shadow: 0 6px 30px rgba(255, 105, 180, 0.6);
            background: linear-gradient(135deg, var(--pink-accent), var(--pink-deep));
        }

        /* Playlist */
        .playlist-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--pink-accent);
            margin: 25px 0 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .playlist {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 15px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--pink-main);
            transform: translateX(5px);
        }

        .playlist-item.active {
            background: rgba(255, 105, 180, 0.1);
            border-color: var(--pink-accent);
        }

        .playlist-item .item-number {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--pink-pastel);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--pink-accent);
            flex-shrink: 0;
        }

        .playlist-item.active .item-number {
            background: var(--pink-accent);
            color: white;
        }

        .playlist-item .item-info {
            flex: 1;
        }

        .playlist-item .item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .playlist-item .item-artist {
            font-size: 12px;
            color: var(--text-light);
        }

        .playlist-item .item-playing {
            font-size: 18px;
            display: none;
        }

        .playlist-item.active .item-playing {
            display: block;
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Music notes effect container */
        .music-notes-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        /* Empty playlist message */
        .empty-playlist {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-playlist .empty-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .empty-playlist p {
            font-size: 14px;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .vinyl-disc {
                width: 180px;
                height: 180px;
            }

            .song-title {
                font-size: 18px;
            }

            .controls {
                gap: 15px;
            }

            .control-btn.play-btn {
                width: 55px;
                height: 55px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-heart">💕</div>
        <div class="loading-text">Đang tải yêu thương...</div>
    </div>

    <!-- Floating Hearts Background -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- Music Notes Container -->
    <div class="music-notes-container" id="musicNotesContainer"></div>

    <!-- Main Content -->
    <div class="page-wrapper">
        <div class="music-page">
            <h1 class="page-title">🎶 Nhạc dành cho em</h1>
            <p class="page-subtitle">Mỗi bài hát là một lời yêu thương</p>

            <!-- Vinyl Disc -->
            <div class="vinyl-container">
                <div class="vinyl-disc" id="vinylDisc"></div>
            </div>

            <!-- Now Playing -->
            <div class="now-playing">
                <div class="song-title" id="songTitle">Chưa có bài nào</div>
                <div class="song-artist" id="songArtist">---</div>
                <div class="song-message" id="songMessage">
                    Thêm file nhạc MP3 vào thư mục assets/music/ nhé 🎵
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar-wrapper" id="progressWrapper">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="control-btn" id="prevBtn" onclick="prevSong()">⏮️</button>
                <button class="control-btn play-btn" id="playBtn" onclick="togglePlay()">▶️</button>
                <button class="control-btn" id="nextBtn" onclick="nextSong()">⏭️</button>
            </div>

            <!-- Playlist -->
            <div class="playlist-title">📋 Danh sách phát</div>
            <div class="playlist" id="playlist">
                <!-- Playlist items rendered by JS -->
            </div>
        </div>
    </div>

    <!-- Back Button -->

    <!-- Hidden Audio Element -->
    <audio id="audioPlayer"></audio>

    <script src="js/transition.js"></script>
    <script src="js/music.js"></script>
</body>
</html>
